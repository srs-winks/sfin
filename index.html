<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudentFolio – Your Finance Companion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="mob-overlay" id="mobOverlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-icon">₹</div>
      <div>
        <div class="brand-name">StudentFolio</div>
        <div class="brand-sub">Finance Companion</div>
      </div>
    </div>
    <nav class="nav">
      <a class="nav-item active" data-page="dashboard">
        <span class="nav-icon">📊</span><span class="nav-label">Dashboard</span>
      </a>
      <a class="nav-item" data-page="portfolio">
        <span class="nav-icon">💼</span><span class="nav-label">Portfolio</span>
      </a>
      <a class="nav-item" data-page="goals">
        <span class="nav-icon">🎯</span><span class="nav-label">Goals</span>
      </a>
      <a class="nav-item" data-page="advisor">
        <span class="nav-icon">🤖</span><span class="nav-label">Advisor</span>
      </a>
      <a class="nav-item" data-page="whyearly">
        <span class="nav-icon">📈</span><span class="nav-label">Why Start Early?</span>
      </a>
      <a class="nav-item" data-page="funds">
        <span class="nav-icon">🏦</span><span class="nav-label">Fund Explorer</span>
      </a>
    </nav>
    <div class="nav-footer">
      <a class="nav-item" data-page="profile">
        <span class="nav-icon">👤</span><span class="nav-label">Profile</span>
      </a>
      <div class="sidebar-disclaimer">⚠️ Not SEBI Registered.<br/>Educational use only.</div>
    </div>
  </aside>

  <div class="main-wrap">
    <header class="topbar">
      <button class="menu-btn" id="menuBtn">☰</button>
      <div class="topbar-title" id="topbarTitle">Dashboard</div>
      <div class="topbar-right">
        <span class="price-badge" id="priceBadge">🟡 Manual Mode</span>
        <button class="btn-refresh" id="btnRefresh">⟳ Refresh Prices</button>
      </div>
    </header>
    <div class="content" id="content"></div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box" id="modalBox"></div>
  </div>
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
